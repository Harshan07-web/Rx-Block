version: "3.9"

services:
  backend:
    build: .
    container_name: blockchain-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ganache

  ganache:
    image: trufflesuite/ganache
    container_name: ganache-blockchain
    ports:
      - "7545:8545"
    command: ganache --host 0.0.0.0 --port 8545